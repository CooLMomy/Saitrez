<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wxWidgets — Шпаргалка</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@700;900&family=Geologica:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --border2: #253550;
  --ok: #00e5a0;
  --ok-dim: #00c48822;
  --ok-mid: #00c48844;
  --err: #ff4d6d;
  --err-dim: #ff4d6d18;
  --err-mid: #ff4d6d33;
  --warn: #ffd166;
  --warn-dim: #ffd16618;
  --text: #e8f0fe;
  --text2: #8fa3c0;
  --text3: #5a7090;
  --accent: #4f8ef7;
  --mono: 'JetBrains Mono', monospace;
  --head: 'Unbounded', sans-serif;
  --body: 'Geologica', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 0%, #0d1f4422 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 90% 100%, #0a2a3a22 0%, transparent 60%);
}

.title-block h1 {
  font-family: var(--head);
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.1;
  background: linear-gradient(90deg, #e8f0fe 0%, #8bb4f8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.title-block p {
  font-size: 0.72rem;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.controls {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  padding: 11px 14px 11px 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
}

.search-wrap input::placeholder { color: var(--text3); }

.filter-btns {
  display: flex;
  gap: 6px;
}

.fbtn {
  padding: 9px 16px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-family: var(--body);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.fbtn:hover { border-color: var(--border2); color: var(--text); }
.fbtn.active-all { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.08); }
.fbtn.active-ok { border-color: var(--ok); color: var(--ok); background: var(--ok-dim); }
.fbtn.active-err { border-color: var(--err); color: var(--err); background: var(--err-dim); }

.stats-row {
  display: flex;
  gap: 1.2rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text2);
}

.stat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* LEGEND */
.legend {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--text2);
}

.leg-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.leg-ok { background: var(--ok-mid); color: var(--ok); }
.leg-err { background: var(--err-mid); color: var(--err); }
.leg-warn { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(255,209,102,0.3); }

/* CARDS */
.cards-container {
  padding: 1.5rem 1.5rem 3rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  max-width: 1100px;
  margin: 0 auto;
}

.card {
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.card.ok-card { border-left: 3px solid var(--ok); }
.card.err-card { border-left: 3px solid var(--err); }

.card-header {
  padding: 1.1rem 1.4rem 0.9rem;
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}

.num-badge {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
}

.ok-card .num-badge { background: var(--ok-dim); color: var(--ok); }
.err-card .num-badge { background: var(--err-dim); color: var(--err); }

.question-text {
  font-size: 1.05rem;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text);
  flex: 1;
}

.card-body {
  padding: 0 1.4rem 1.2rem;
}

.answer-block {
  padding: 0.8rem 1.1rem;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 0.88rem;
  line-height: 1.7;
  word-break: break-all;
  position: relative;
  overflow: hidden;
}

.ok-card .answer-block {
  background: var(--ok-dim);
  border: 1px solid rgba(0,229,160,0.2);
  color: #a0ffd8;
}

.err-card .answer-block {
  background: var(--err-dim);
  border: 1px solid rgba(255,77,109,0.2);
  color: #ffb3c1;
}

.answer-label {
  font-size: 0.67rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--body);
  font-weight: 700;
  margin-bottom: 6px;
  display: block;
}

.ok-card .answer-label { color: var(--ok); }
.err-card .answer-label { color: var(--err); }

/* DETAIL SECTION */
.detail-section {
  margin-top: 0.9rem;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.detail-header {
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  background: var(--surface2);
  user-select: none;
  transition: background 0.15s;
}

.detail-header:hover { background: #1e2a40; }

.detail-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--warn);
  letter-spacing: 0.02em;
}

.detail-title .icon { font-size: 14px; }

.chevron {
  color: var(--text3);
  font-size: 12px;
  transition: transform 0.2s;
}

.detail-body {
  display: none;
  padding: 1rem;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

.detail-section.open .detail-body { display: block; }
.detail-section.open .chevron { transform: rotate(180deg); }

.detail-note {
  font-size: 0.88rem;
  color: var(--text2);
  line-height: 1.65;
  margin-bottom: 1rem;
}

/* Options list */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.opt-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 0.75rem 1rem;
  border-radius: 9px;
  font-size: 0.85rem;
  border: 1px solid transparent;
}

.opt-correct {
  background: var(--ok-dim);
  border-color: rgba(0,229,160,0.25);
}

.opt-wrong {
  background: var(--err-dim);
  border-color: rgba(255,77,109,0.2);
}

.opt-maybe {
  background: var(--warn-dim);
  border-color: rgba(255,209,102,0.25);
}

.opt-neutral {
  background: rgba(255,255,255,0.03);
  border-color: var(--border);
}

.opt-marker {
  width: 22px; height: 22px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
  margin-top: 0px;
}

.mk-correct { background: var(--ok-mid); color: var(--ok); }
.mk-wrong { background: var(--err-mid); color: var(--err); }
.mk-maybe { background: rgba(255,209,102,0.25); color: var(--warn); }
.mk-neutral { background: var(--border); color: var(--text3); }

.opt-content { flex: 1; }
.opt-code {
  font-family: var(--mono);
  font-size: 0.82rem;
  line-height: 1.5;
  color: var(--text);
  word-break: break-all;
}

.opt-correct .opt-code { color: #a0ffd8; }
.opt-wrong .opt-code { color: #ffb3c1; }
.opt-maybe .opt-code { color: #ffe69a; }

.opt-explain {
  font-size: 0.76rem;
  color: var(--text2);
  margin-top: 4px;
  line-height: 1.5;
}

.opt-correct .opt-explain { color: rgba(0,229,160,0.7); }
.opt-wrong .opt-explain { color: rgba(255,77,109,0.7); }
.opt-maybe .opt-explain { color: rgba(255,209,102,0.7); }

/* NO RESULTS */
.no-results {
  text-align: center;
  padding: 4rem;
  color: var(--text3);
}

.no-results .big { font-size: 3rem; margin-bottom: 0.5rem; }
.no-results p { font-size: 0.9rem; }

/* BOTTOM BAR */
.header {
  position: fixed !important;
  bottom: 0 !important;
  top: auto !important;
  left: 0; right: 0;
  z-index: 100;
  background: rgba(10,14,26,0.97) !important;
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border) !important;
  border-bottom: none !important;
  padding: 0.75rem 1.2rem !important;
}
.header-top { display: none !important; }
.stats-row { margin-top: 0.5rem; }
body { padding-bottom: 120px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a5070; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
  </div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>

    </div>
    <div class="filter-btns">
      <button class="fbtn active-all" id="btnAll" onclick="setFilter('all')">Все</button>

      <button class="fbtn" id="btnErr" onclick="setFilter('err')">✗ Неверные</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-chip"><div class="stat-dot" style="background:var(--text3)"></div><span id="statTotal">0 вопросов</span></div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--ok)"></div><span id="statOk">0 верных</span></div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--err)"></div><span id="statErr">0 неверных</span></div>
  </div>
</div>



<div class="cards-container" id="cardsContainer"></div>

let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.getElementById('btnAll').className = 'fbtn' + (f==='all' ? ' active-all' : '');
  document.getElementById('btnOk').className = 'fbtn' + (f==='ok' ? ' active-ok' : '');
  document.getElementById('btnErr').className = 'fbtn' + (f==='err' ? ' active-err' : '');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let rows = data;
  if (currentFilter === 'ok') rows = rows.filter(r => r[3] === OK);
  if (currentFilter === 'err') rows = rows.filter(r => r[3] === ERR);
  if (q) rows = rows.filter(r => r[1].toLowerCase().includes(q) || r[2].toLowerCase().includes(q));
  renderCards(rows);
}

function toggleDetail(el) {
  const section = el.closest('.detail-section');
  section.classList.toggle('open');
}

function getStatusClass(status) {
  return {correct:'opt-correct', wrong:'opt-wrong', maybe:'opt-maybe', neutral:'opt-neutral'}[status] || 'opt-neutral';
}

function getMarkerClass(status) {
  return {correct:'mk-correct', wrong:'mk-wrong', maybe:'mk-maybe', neutral:'mk-neutral'}[status] || 'mk-neutral';
}

function getMarkerSymbol(status) {
  return {correct:'✓', wrong:'✗', maybe:'+', neutral:'○'}[status] || '○';
}

function renderCards(rows) {
  const container = document.getElementById('cardsContainer');
  
  if (rows.length === 0) {
    container.innerHTML = `<div class="no-results"><div class="big">🔍</div><p>Ничего не найдено</p></div>`;
    updateStats(rows);
    return;
  }

  container.innerHTML = rows.map((r, idx) => {
    const [num, question, answer, type, note, options] = r;
    const isErr = type === ERR;
    const cardClass = isErr ? 'err-card' : 'ok-card';
    const answerLabel = isErr ? 'Ответ по тесту (засчитан неверным)' : 'Правильный ответ';

    let detailHtml = '';
    if (isErr && note) {
      let optionsHtml = '';
      if (options && options.length) {
        optionsHtml = `<div class="options-list">` + options.map(opt => `
          <div class="opt-item ${getStatusClass(opt.status)}">
            <div class="opt-marker ${getMarkerClass(opt.status)}">${getMarkerSymbol(opt.status)}</div>
            <div class="opt-content">
              <div class="opt-code">${escHtml(opt.code)}</div>
              ${opt.explain ? `<div class="opt-explain">${escHtml(opt.explain)}</div>` : ''}
            </div>
          </div>
        `).join('') + `</div>`;
      }

      detailHtml = `
        <div class="detail-section" id="detail-${num}">
          <div class="detail-header" onclick="toggleDetail(this)">
            <div class="detail-title">
              <span class="icon">⚠</span>
              Подробный разбор ошибки
            </div>
            <span class="chevron">▾</span>
          </div>
          <div class="detail-body">
            <p class="detail-note">${escHtml(note)}</p>
            ${optionsHtml}
          </div>
        </div>
      `;
    }

    return `
      <div class="card ${cardClass}" style="animation-delay:${Math.min(idx * 0.02, 0.3)}s">
        <div class="card-header">
          <div class="num-badge">${num}</div>
          <div class="question-text">${escHtml(question)}</div>
        </div>
        <div class="card-body">
          <div class="answer-block">
            <span class="answer-label">${answerLabel}</span>
            ${escHtml(answer)}
          </div>
          ${detailHtml}
        </div>
      </div>
    `;
  }).join('');

  updateStats(rows);
}

function updateStats(rows) {
  const okCount = rows.filter(r => r[3] === OK).length;
  const errCount = rows.filter(r => r[3] === ERR).length;
  document.getElementById('statTotal').textContent = `${rows.length} вопросов`;
  document.getElementById('statOk').textContent = `${okCount} верных`;
  document.getElementById('statErr').textContent = `${errCount} неверных`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderCards(data);
updateStats(data);
</script>
