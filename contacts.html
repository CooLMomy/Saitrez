<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — Нуртас Бахтияр</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url("back.png"); 
            background-size: cover;          
            background-position: center;     
            background-repeat: no-repeat;   
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 0;
            text-align: center;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        header nav a:hover { color: #61dafb; }

        .content { 
            flex: 1; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .contact-container {
            background: rgba(30, 30, 30, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: #61dafb; margin-bottom: 30px; }

        .contact-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .method-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .method-card:hover {
            border-color: #61dafb;
            background: rgba(97, 218, 251, 0.1);
        }

        .method-card h3 { margin: 10px 0; font-size: 16px; color: #61dafb; }
        .method-card p { margin: 0; font-size: 14px; opacity: 0.8; }
        .method-card a { color: white; text-decoration: none; font-weight: bold; }

        /* Форма обратной связи */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            background: #222;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #61dafb;
            box-shadow: 0 0 8px rgba(97, 218, 251, 0.3);
        }

        .submit-btn {
            background: #61dafb;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: #fff;
            transform: scale(1.02);
        }

        footer {
            background: rgba(0, 0, 0, 0.8);
            text-align: center;
            padding: 20px 0;
        }
        .ai-chat {
    margin-top: 40px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
}

.ai-chat h2 {
    text-align: center;
    color: #61dafb;
}

#chat {
    height: 200px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
}

.chat-input {
    display: flex;
    gap: 10px;
}

.chat-input input {
    flex: 1;
}

.chat-input button {
    background: #61dafb;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

.chat-input button:hover {
    background: white;
}
    </style>
</head>
    <script>
async function send() {
    let input = document.getElementById("msg");
    let text = input.value;

    if (!text) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += "<p><b>Ты:</b> " + text + "</p>";

    let res = await fetch("https://saitrez-1.onrender.com", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();

    chat.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";

    chat.scrollTop = chat.scrollHeight;
    input.value = "";
}
</script>
<body>

    </nav>
</header>

<div class="content">
    <div class="contact-container">
        <h1>Связаться со мной</h1>

        <div class="contact-methods">
            <div class="method-card">
                <h3>Email</h3>
                <p><a href="mailto:netakrabotaet@gmail.com">netakrabotaet@gmail.com</a></p>
            </div>
            <div class="method-card">
                <h3>Телефон</h3>
                <p><a href="tel:+77771075390">8 777 107 53 90</a></p>
            </div>
            <div class="method-card">
                <h3>Локация</h3>
                <p>Казахстан</p>
            </div>
        </div>

        <form>
    
            <input type="text" placeholder="Ваше имя" required>
            <input type="email" placeholder="Ваш Email" required>
            <textarea rows="5" placeholder="Ваше сообщение" required></textarea>
            <button type="submit" class="submit-btn">Отправить сообщение</button>
        </form>
        <div class="ai-chat">
    <h2>💬 AI помощник</h2>

    <div id="chat"></div>

    <div class="chat-input">
        <input id="msg" placeholder="Напиши сообщение...">
        <button onclick="send()">➤</button>
    </div>
</div>
    </div>
</div>

</html>
